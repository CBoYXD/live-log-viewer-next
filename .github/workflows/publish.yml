name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Node 24 already bundles npm >= 11.5.1 with its provenance deps (sigstore)
      # intact. Reinstalling npm@latest here intermittently ships a broken global
      # tree missing 'sigstore', which fails `npm publish` under trusted
      # publishing (MODULE_NOT_FOUND: sigstore). Use the bundled npm instead.
      - run: npm --version

      - name: Check tag matches package.json version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "Tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - run: bun install --frozen-lockfile

      - run: bun test

      - run: npm publish
